name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - run: bundle exec rspec

  service-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install service deps
        working-directory: lib/whatsapp_notifier/services/web_automation
        # --ignore-scripts: the tests are pure logic (no browser); skip
        # puppeteer's ~500MB Chromium download so CI is fast + can't hang on it.
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Bun service tests (inbound capture, init gate, metrics)
        working-directory: lib/whatsapp_notifier/services/web_automation
        run: bun test
